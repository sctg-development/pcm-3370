name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Make extract script executable
        run: chmod +x extract-and-remove-quarantine.sh

      - name: Extract and remove quarantine
        run: ./extract-and-remove-quarantine.sh

      - name: Build project
        run: make

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: Build-${{ steps.date.outputs.date }}
          release_name: Build ${{ steps.date.outputs.date }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/pcm3370_stress_test.exe
          asset_name: pcm3370_stress_test.exe
          asset_content_type: application/octet-stream

      - name: Set latest release
        run: |
          gh release edit "Build-${{ steps.date.outputs.date }}" --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
