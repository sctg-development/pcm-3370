name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  setup:
    name: Compute build metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      datetime: ${{ steps.meta.outputs.datetime }}
      # datetime_safe: colons replaced by '-' — required for Windows filenames
      # and for git tag names (colons are not allowed in refs).
      datetime_safe: ${{ steps.meta.outputs.datetime_safe }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute version and datetime
        id: meta
        run: |
          VERSION="0.1.0"
          DATETIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DATETIME_SAFE=$(echo "$DATETIME" | tr ':' '-')
          echo "version=$VERSION"             >> "$GITHUB_OUTPUT"
          echo "datetime=$DATETIME"           >> "$GITHUB_OUTPUT"
          echo "datetime_safe=$DATETIME_SAFE" >> "$GITHUB_OUTPUT"

  build-and-release:
    runs-on: macos-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate release notes from recent commits
        run: |
          # Commits since the previous preview tag on this branch (or last 30)
          PREV=$(git tag --sort=-creatordate --list 'preview/*' | head -1 || true)
          if [ -n "$PREV" ]; then
            LOG=$(git log --oneline --no-merges --pretty=format:"- %s (%h)" "${PREV}..HEAD")
          else
            LOG=$(git log --oneline --no-merges --pretty=format:"- %s (%h)" -30)
          fi
          {
            printf "**Branch:** \`keypool-live\`  **Commit:** \`%s\`\n\n" "${{ github.sha }}"
            printf "### Changes\n\n"
            echo "$LOG"
          } > release-notes.md
          echo "--- Release notes preview ---"
          cat release-notes.md

      - name: Make extract script executable
        run: chmod +x extract-and-remove-quarantine.sh

      - name: Extract and remove quarantine
        run: ./extract-and-remove-quarantine.sh

      - name: Build project
        run: make

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          DATETIME: ${{ needs.setup.outputs.datetime }}
          DATETIME_SAFE: ${{ needs.setup.outputs.datetime_safe }}
        run: |
          TAG="preview/${DATETIME_SAFE}"
          TITLE="PCM-3370 ${DATETIME}"

          gh release create "$TAG" \
            --prerelease \
            --title "$TITLE" \
            --notes-file release-notes.md \
            dist/*.exe
